name: Compile PDF

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile logbook
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: overleaf
          root_file: logbook.tex
          latexmk_use_xelatex: true

      - name: Rebuild Overleaf ZIP
        run: make package

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: logbook-pdf
          path: overleaf/logbook.pdf

      - name: Upload Overleaf ZIP
        uses: actions/upload-artifact@v4
        with:
          name: logbook-overleaf-zip
          path: Logbook_Template_Overleaf.zip
